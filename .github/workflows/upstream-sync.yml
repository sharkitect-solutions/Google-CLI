name: Sync Fork with Upstream

on:
  schedule:
    # Every Sunday at midnight UTC (8 PM EST)
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/googleworkspace/cli.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -eq 0 ]; then
            echo "Fork is already up to date with upstream."
          else
            echo "Fork is $BEHIND commits behind upstream."
          fi

      - name: Attempt merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          git merge upstream/main --no-edit && echo "status=success" >> $GITHUB_OUTPUT || echo "status=conflict" >> $GITHUB_OUTPUT

      - name: Push merged changes
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status == 'success'
        run: git push origin main

      - name: Open issue on merge conflict
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const behind = '${{ steps.check.outputs.behind }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream sync failed: merge conflict (${behind} commits behind)`,
              body: `The weekly upstream sync encountered merge conflicts.\n\n` +
                    `**Upstream:** googleworkspace/cli\n` +
                    `**Commits behind:** ${behind}\n\n` +
                    `Manual resolution required:\n` +
                    '```bash\n' +
                    `git remote add upstream https://github.com/googleworkspace/cli.git\n` +
                    `git fetch upstream main\n` +
                    `git merge upstream/main\n` +
                    `# Resolve conflicts, then:\n` +
                    `git push origin main\n` +
                    '```',
              labels: ['upstream-sync', 'needs-attention']
            });
